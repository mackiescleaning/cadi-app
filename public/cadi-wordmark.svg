<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 140" width="520" height="140" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600&amp;display=swap');
    </style>
    <linearGradient id="grad-a" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#a8c4ff"/>
      <stop offset="100%" stop-color="#4f78ff"/>
    </linearGradient>
    <linearGradient id="grad-d" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#6090ff"/>
      <stop offset="100%" stop-color="#2e55f0"/>
    </linearGradient>
    <radialGradient id="dot-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="35%"  stop-color="#a8c4ff"/>
      <stop offset="65%"  stop-color="#4f78ff"/>
      <stop offset="100%" stop-color="#1d38c4" stop-opacity="0"/>
    </radialGradient>
    <filter id="dot-glow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="a-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- C — dim pale blue -->
  <text x="0" y="118"
    font-family="'Plus Jakarta Sans', sans-serif"
    font-weight="600"
    font-size="128"
    fill="rgba(196,211,255,0.65)"
    letter-spacing="-6">C</text>

  <!-- a — white to electric blue gradient -->
  <text x="88" y="118"
    font-family="'Plus Jakarta Sans', sans-serif"
    font-weight="600"
    font-size="128"
    fill="url(#grad-a)"
    filter="url(#a-glow)"
    letter-spacing="-6">a</text>

  <!-- d — electric blue gradient -->
  <text x="186" y="118"
    font-family="'Plus Jakarta Sans', sans-serif"
    font-weight="600"
    font-size="128"
    fill="url(#grad-d)"
    filter="url(#a-glow)"
    letter-spacing="-6">d</text>

  <!-- i stem — very dim (no dot, just stem) -->
  <text x="278" y="118"
    font-family="'Plus Jakarta Sans', sans-serif"
    font-weight="600"
    font-size="128"
    fill="rgba(255,255,255,0.35)"
    letter-spacing="-6">ı</text>

  <!-- dot on the i — glowing spark -->
  <circle cx="300" cy="12" r="10" fill="url(#dot-grad)" filter="url(#dot-glow)"/>
  <circle cx="300" cy="12" r="4.5" fill="white"/>
</svg>
